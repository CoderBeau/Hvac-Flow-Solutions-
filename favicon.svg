<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- White rounded square with navy border -->
  <rect x="3" y="3" width="94" height="94" rx="18" fill="white" stroke="#0B1E3B" stroke-width="6"/>

  <!-- Diagonal navy divider line (bottom-left to top-right) -->
  <line x1="10" y1="90" x2="90" y2="10" stroke="#0B1E3B" stroke-width="5" stroke-linecap="round"/>

  <!-- Snowflake (upper-left) — blue -->
  <g stroke="#3A9EDB" stroke-width="3.2" stroke-linecap="round" transform="translate(29,31)">
    <line x1="0" y1="-15" x2="0" y2="15"/>
    <line x1="-15" y1="0" x2="15" y2="0"/>
    <line x1="-10.6" y1="-10.6" x2="10.6" y2="10.6"/>
    <line x1="10.6" y1="-10.6" x2="-10.6" y2="10.6"/>
    <!-- branch tips -->
    <line x1="-4" y1="-11" x2="0" y2="-15"/><line x1="4" y1="-11" x2="0" y2="-15"/>
    <line x1="-4" y1="11"  x2="0" y2="15"/> <line x1="4" y1="11"  x2="0" y2="15"/>
    <line x1="-11" y1="-4" x2="-15" y2="0"/><line x1="-11" y1="4" x2="-15" y2="0"/>
    <line x1="11"  y1="-4" x2="15"  y2="0"/><line x1="11"  y1="4" x2="15"  y2="0"/>
  </g>

  <!-- Heat waves (lower-right) — red -->
  <g fill="none" stroke="#C8102E" stroke-width="3.8" stroke-linecap="round">
    <path d="M54 62 Q 60 56, 66 62 T 78 62"/>
    <path d="M54 72 Q 60 66, 66 72 T 78 72"/>
    <path d="M54 82 Q 60 76, 66 82 T 78 82"/>
  </g>
</svg>
